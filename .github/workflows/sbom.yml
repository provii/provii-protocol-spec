# SHARED sbom.yml — JS/TS worker profile. Generates a CI SBOM artifact (SPDX + CycloneDX) on
# push/PR/dispatch. It does NOT attach to the GH release — the tag release (with its SBOM) is
# built solely by deploy.yml's release job, so two workflows never race to create the release.
name: SBOM Generation

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.gitignore'
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/sbom.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # === JS path (anchore/sbom-action: SPDX + CycloneDX) — CI artifact only ===
  generate-sbom-js:
    name: Generate SBOM (JS)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with: { format: spdx-json, output-file: sbom-spdx.json, upload-release-assets: false }
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with: { format: cyclonedx-json, output-file: sbom-cyclonedx.json, upload-release-assets: false }
      - name: Validate SBOM files
        run: |
          jq empty sbom-cyclonedx.json
          jq empty sbom-spdx.json
          echo "SBOM files are valid JSON"
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90
