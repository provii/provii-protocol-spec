# SHARED security-audit.yml — JS/TS worker profile (provii-status and the other js-workers).
# Full security suite, ALL gates blocking (no soft-fail): npm audit + licences, dependency-review,
# trivy, gitleaks (binary, no licence needed), zizmor, semgrep. Triggers: push, PR (dep/workflow
# paths), weekly cron, dispatch.
#
# CodeQL is handled by the org-enforced GHAS *default setup* (a separate "CodeQL" check), so there
# is deliberately NO CodeQL job here and no advanced codeql.yml — an advanced config cannot run
# while default setup is enabled (org-controlled).
name: Security Audit

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.gitignore'
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/security-audit.yml'
  schedule:
    - cron: '0 2 * * 1'   # Mondays 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '22'

jobs:
  # === Dependency vulnerabilities + licence compliance (JS) ===
  npm-audit:
    name: npm Audit & Licences
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm ci
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
      - name: Licence compliance (no copyleft in production deps)
        run: npx license-checker --production --failOn 'GPL;AGPL;LGPL;SSPL' --summary

  # === Dependency review (PR only; GHAS, blocking) ===
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions: { contents: read }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0, LGPL-3.0

  # === Trivy filesystem scan (vuln) — blocking ===
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { contents: read, security-events: write, actions: read }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          limit-severities-for-sarif: 'true'
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        with: { sarif_file: trivy-results.sarif }

  # === Secret detection (gitleaks binary — no org licence required) ===
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false, fetch-depth: 0 }
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -C /tmp -xzf /tmp/gitleaks.tar.gz gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --exit-code 1

  # === Workflow security linting (zizmor) — blocking on high ===
  zizmor:
    name: Workflow Security Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - name: Run Zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          min-severity: high
          advanced-security: false

  # === SAST (semgrep; blocking on ERROR) ===
  semgrep:
    name: Semgrep SAST
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { contents: read, security-events: write, actions: read }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: '3.12' }
      - name: Install Semgrep
        run: pip install semgrep==1.139.0
      - name: Run Semgrep (blocking on ERROR)
        run: semgrep --config p/javascript --config p/typescript --config p/security-audit --config p/secrets --error --severity ERROR .
      - name: Run Semgrep (SARIF)
        if: always()
        run: semgrep --config p/javascript --config p/typescript --config p/security-audit --config p/secrets --sarif --output semgrep-results.sarif . || true
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with: { sarif_file: semgrep-results.sarif, category: semgrep }

  # === Aggregate report + hard gate ===
  report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [npm-audit, dependency-review, trivy, gitleaks, zizmor, semgrep]
    if: always()
    permissions: { contents: read }
    steps:
      - name: Summary + gate
        env:
          R_NPM: ${{ needs.npm-audit.result }}
          R_DEPREVIEW: ${{ needs.dependency-review.result }}
          R_TRIVY: ${{ needs.trivy.result }}
          R_GITLEAKS: ${{ needs.gitleaks.result }}
          R_ZIZMOR: ${{ needs.zizmor.result }}
          R_SEMGREP: ${{ needs.semgrep.result }}
        run: |
          {
            echo "## Security Audit Summary"
            echo "- npm audit & licences: ${R_NPM}"
            echo "- Dependency Review: ${R_DEPREVIEW}"
            echo "- Trivy: ${R_TRIVY}"
            echo "- Secret Detection: ${R_GITLEAKS}"
            echo "- Zizmor: ${R_ZIZMOR}"
            echo "- Semgrep: ${R_SEMGREP}"
          } >> "$GITHUB_STEP_SUMMARY"
          # ALL gates blocking. dependency-review is PR-only (skipped on push = allowed).
          # CodeQL is the separate org default-setup "CodeQL" check (gate via branch protection).
          failed=""
          for pair in "npm-audit:$R_NPM" "trivy:$R_TRIVY" "gitleaks:$R_GITLEAKS" "zizmor:$R_ZIZMOR" "semgrep:$R_SEMGREP" "dependency-review:$R_DEPREVIEW"; do
            name="${pair%%:*}"; res="${pair##*:}"
            [ "$res" = "failure" ] && failed="$failed $name"
          done
          if [ -n "$failed" ]; then echo "::error::Security checks failed:${failed}"; exit 1; fi
          echo "All security gates passed"
