# CANONICAL SHARED cla.yml  (every public Provii repo)
#
# Contributor Licence Agreement gate. A contributor signs by commenting the magic line on
# their PR; the action records the signature in signatures/cla.json on the default branch.
#
# Placeholders to fill per repo:
#   <CLA_ALLOWLIST>  comma-separated logins exempt from signing. Bots MUST be listed (they
#                    cannot comment the magic line). Keep the maintainer login(s) here too.
#                    Current org default: dependabot[bot],renovate[bot],github-actions[bot],tim-maelstrom
#
# WHY pull_request_target (not pull_request): the action needs write access to push the
# signature file + post the status, which a fork's pull_request token cannot do. This trigger
# runs in the BASE repo context, so the job must NOT check out or run untrusted PR code — it
# only calls the pinned action with the event payload. Keep it that way.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip bot PRs (they are allowlisted below and cannot sign).
    if: >-
      github.event_name == 'issue_comment' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.actor != 'renovate[bot]')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: CLA Assistant
        if: >-
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          # <CLA_ALLOWLIST>: bots + maintainers exempt from signing.
          allowlist: 'dependabot[bot],renovate[bot],github-actions[bot],tim-maelstrom'
          custom-notsigned-prcomment: >-
            Thank you for your pull request. Before we can review it, you need
            to sign our [Contributor Licence Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).
            Please read the CLA and reply to this comment with the following
            statement to indicate your agreement:


            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
